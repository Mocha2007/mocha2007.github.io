<!doctype html>
<html lang="en-US">
<meta charset="utf-8">
<meta name="description" content="Name Generator">
<link rel="shortcut icon" href="../img/favicon.ico">
<link href="../css/button.css" type="text/css" rel="stylesheet">
<script src="../common.js" defer></script>
<script src="name.js" defer></script>
<title>Name Generator</title>
<style>
	html {
		background-color: black;
		font-size: 4vh;
	}
	h1 {
		color: white;
		margin: 1vh 1vw;
	}
	label {
		background-color: #dff;
		border: max(0.2vw, 0.2vh) solid black;
		border-radius: max(1vw, 1vh);
		padding: 0 0 0 1vw;
		margin: 0 0.2vw;
	}
	#count, #result {
		background-color: silver;
		margin: 1vh 1vw;
		text-align: center;
		width: 96vw;
	}
	#result {
		font-size: 9vh;
		height: fit-content;
		line-height: 15vh;
		position: relative;
		text-wrap: balance;
	}
</style>
<h1 id="Name_Generator">Name Generator</h1>

<div id="langs" onclick="namegen.updateCount();"></div>
<span class="button" onclick="namegen.run();">New Name</span>
<div id="count">-</div>
<div id="result"></div>
</html>
