<!doctype html>
<html lang="en-US">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="shortcut icon" href="../img/favicon.ico">
<link href="tool.css" type="text/css" rel="stylesheet">
<title>Geocoord MoE Calc</title>
<h1>Geocoord Margin of Error Calculator</h1>

<span class="button" onclick="getLoc();">Use my location</span>
<div onkeyup="main()" onclick="main()" style="max-width: fit-content;">
	<a href="https://en.wikipedia.org/wiki/Latitude">Latitude</a> (&phi;): <input id="lat" type="number" min="-90" max="90" value="0"> (MoE: &plusmn;<span id="latmoe">-</span>)<br>
	<a href="https://en.wikipedia.org/wiki/Longitude">Longitude</a> (&lambda;): <input id="lon" type="number" min="-180" max="360" value="0"> (MoE: &plusmn;<span id="lonmoe">-</span>)
	<hr>
</div>
<strong>Total MoE: &plusmn;<span id="totmoe"></span></strong><br>
Approximate Continent: <a id="continent"></a><br>
Containing Rectangle Area: <span id="area">-</span><br>
<a href="https://en.wikipedia.org/wiki/Tangential_speed">v<sub>tan</sub></a>: <span id="vtan">-</span> m/s<br>
<a href="https://en.wikipedia.org/wiki/Local_mean_time">LMT</a>: <span id="lmst">-</span>

<script>
const R_E = 6371000; // todo account for oblateness
const DAY_SIDEREAL = 86164.100352;
const r_at_lat = lat => R_E * Math.cos(lat);
const digits = s => s.includes('.') ? s.split('.')[1].length : 0;
const moe = (r, n_digits) => Math.PI * r / (180 * Math.pow(10, n_digits));
const len = x => x < 1e3 ? `${Math.round(x)} m` : `${Math.round(x)/1e3} km`;
const area = x => x < 1e6 ? `${Math.round(x)} m&sup2;` : `${(Math.round(x)/1e6).toLocaleString()} km&sup2;`;
const continent = (lat, lon) => { // this is VERY approximate
	if (lat < -58) return "Antarctica";
	if (lon < -25){ // western hemisphere
		if (11 < lat) return "North America";
		if (-99 < lon) return "South America";
		return "Oceania";
	}
	if (37 < lat && lon < 53) return "Europe";
	if (34 < lat && 13 < lon) return "Asia";
	if (lon < 65) return "Africa";
	return "Oceania";
};
const contelem = document.getElementById('continent');
const getLoc = () =>
	navigator.geolocation.getCurrentPosition(gc => {
		document.getElementById('lat').value = gc.coords.latitude;
		document.getElementById('lon').value = gc.coords.longitude;
		main();
	},
	e => console.debug(`Couldn't get geolocation due to ${e}`));

function main(){
	const INPUT_LAT = document.getElementById('lat').value;
	const LAT = INPUT_LAT * Math.PI/180;
	const INPUT_LON = document.getElementById('lon').value;
	const LON = INPUT_LON * Math.PI/180;
	const MOE_LAT = moe(R_E, digits(INPUT_LAT));
	const MOE_LON = moe(r_at_lat(LAT), digits(INPUT_LON));
	const MOE_TOT = Math.hypot(MOE_LAT, MOE_LON);
	const MOE_AREA = 4 * MOE_LAT * MOE_LON;
	// output
	document.getElementById('latmoe').innerHTML = len(MOE_LAT);
	document.getElementById('lonmoe').innerHTML = len(MOE_LON);
	document.getElementById('totmoe').innerHTML = len(MOE_TOT);
	document.getElementById('area').innerHTML = area(MOE_AREA);
	document.getElementById('vtan').innerHTML = (Math.cos(LAT) * 2 * Math.PI * R_E / DAY_SIDEREAL).toFixed(1);
	document.getElementById('lmst').innerHTML = new Date(
		// longitude hour angle
		LON/Math.PI*12*60*60*1000
		// current hour, UTC
		+Date.now()
		).toLocaleTimeString("en-US", { timeZone: "UTC" });
	contelem.innerHTML = continent(+INPUT_LAT, +INPUT_LON);
	contelem.href = `https://en.wikipedia.org/wiki/${contelem.innerHTML}`;
	return {MOE_LAT, MOE_LON, MOE_TOT, MOE_AREA};
}
main();
</script>
</html>
