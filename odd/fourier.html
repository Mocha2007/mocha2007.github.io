.sine {
	/* need to specify animation-duration and width */
	display: inline-block;
	position: relative;
	animation-iteration-count: infinite;
	animation-name: bounce;
	animation-timing-function: linear;
}
/* animation: scroll-left 20s linear infinite; */
@keyframes bounce {
	/* sine-like */
	0% {
		left: 50%;
	}
	6.25% {
		left: 69.1341716183%;
	}
	12.5% {
		left: 85.3553390593%;
	}

	}
	93.75% {
		left: 30.8658283817%;
	}
	100% {
		left: 50%;
	}
}
</style>
